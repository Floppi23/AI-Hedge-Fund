version: "3.9"

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alpha}
      POSTGRES_DB: ${POSTGRES_DB:-alpha_copilot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alpha}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
